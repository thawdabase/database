<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>THAWDABASE</title>
<link rel="icon" type="image/png" href="images/favicon/favicon.png">
<link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
<style>
/* ── RESET ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --cyan:    #00e5ff;
  --dark:    #0a1214;
  --card-bg: #0d1a1e;
  --border:  #00e5ff;
  --red:     #ff2222;
  --text:    #00e5ff;
  --muted:   #336677;
  --font:    'VT323', monospace;
}

body {
  background: url("https://raw.githubusercontent.com/thawdabase/database/main/images/bg/togetherBg.png") no-repeat center top fixed;
  color: var(--cyan);
  font-family: var(--font);
  font-size: 18px;
  min-height: 100vh;
  overflow-x: hidden;
}

/* ══════════════════════════════════════
   TOPBAR
══════════════════════════════════════ */
#topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 20px;
  border-bottom: 2px solid var(--border);
  background: transparent;
  position: sticky;
  top: 0;
  height:110px;
  z-index: 100;
}

#logo {
  display: flex;
  align-items: center;
  gap: 12px;
  font-size: 28px;
  letter-spacing: 2px;
  text-transform: uppercase;
  white-space: nowrap;
}

#logo-icon {
  width: 36px;
  height: 36px;
  border: 2px solid var(--cyan);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  flex-shrink: 0;
}

#search {
  background: #000;
  border: 2px solid var(--cyan);
  color: var(--cyan);
  font-family: var(--font);
  font-size: 20px;
  padding: 6px 16px;
  width: 280px;
  outline: none;
  letter-spacing: 1px;
  border-radius: 999px;
}
#search::placeholder { color: var(--muted); }

/* ══════════════════════════════════════
   APP WRAPPER
══════════════════════════════════════ */
#app { padding: 16px; }

/* ══════════════════════════════════════
   LOADING / EMPTY
══════════════════════════════════════ */
#loading {
  text-align: center;
  font-size: 28px;
  padding: 60px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--muted);
}

/* ══════════════════════════════════════
   GRID VIEW  — shared base
══════════════════════════════════════ */
#grid-view {
  display: grid;
  gap: 8px;
}

.cat-card {
  border: 1px solid var(--muted);
  background: var(--card-bg);
  cursor: pointer;
  transition: border-color 0.12s;
}
.cat-card:hover { border-color: var(--cyan); }

.card-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 4px 8px;
  background: rgba(0,0,0,0.4);
  border-bottom: 1px solid var(--muted);
}
.card-name { font-size: 15px; text-transform: uppercase; letter-spacing: 1px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

.card-rating {
  background: var(--cyan);
  color: #000;
  font-size: 14px;
  padding: 1px 10px 1px 6px;
  font-weight: bold;
  position: relative;
  flex-shrink: 0;
  margin-left: 6px;
}
.card-rating::before {
  content: '';
  position: absolute;
  top: 3px; right: 3px;
  width: 5px; height: 5px;
  background: var(--red);
  border-radius: 50%;
}

.card-photo {
  width: 100%;
  aspect-ratio: 1 / 1;
  object-fit: cover;
  display: block;
  background: #111;
  filter: saturate(0.3) hue-rotate(160deg) brightness(0.9);
}
.card-photo-placeholder {
  width: 100%;
  aspect-ratio: 1 / 1;
  background: #111;
}

.card-bounty {
  background: var(--cyan);
  color: #000;
  font-size: 17px;
  padding: 4px 8px;
  text-transform: uppercase;
  letter-spacing: 1px;
}

/* ══════════════════════════════════════
   DETAIL VIEW — shared base
══════════════════════════════════════ */
#detail-view { display: none; }

#back-btn {
  background: none;
  border: 1px solid var(--muted);
  color: var(--cyan);
  font-family: var(--font);
  font-size: 20px;
  padding: 4px 16px;
  cursor: pointer;
  letter-spacing: 1px;
  margin-bottom: 14px;
  text-transform: uppercase;
}
#back-btn:hover { border-color: var(--cyan); }

/* LEFT profile card */
#detail-left {
  border: 1px solid var(--muted);
  background: var(--card-bg);
}
#detail-card-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 6px 10px;
  border-bottom: 1px solid var(--muted);
}
#detail-name-role { font-size: 18px; text-transform: uppercase; letter-spacing: 1px; overflow: hidden; text-overflow: ellipsis; }
#detail-rating {
  background: var(--cyan);
  color: #000;
  font-size: 18px;
  padding: 2px 14px 2px 8px;
  position: relative;
  flex-shrink: 0;
  margin-left: 8px;
}
#detail-rating::before {
  content: '';
  position: absolute;
  top: 4px; right: 4px;
  width: 6px; height: 6px;
  background: var(--red);
  border-radius: 50%;
}

#detail-photo {
  width: 100%;
  aspect-ratio: 1 / 1;
  object-fit: cover;
  display: block;
  background: #111;
  filter: saturate(0.3) hue-rotate(160deg) brightness(0.9);
}
#detail-photo-placeholder {
  width: 100%;
  aspect-ratio: 1 / 1;
  background: #111;
}

#detail-bounty-bar {
  background: var(--cyan);
  color: #000;
  font-size: 22px;
  padding: 6px 10px;
  text-transform: uppercase;
  letter-spacing: 1px;
}
#detail-meta {
  padding: 10px;
  font-size: 16px;
  line-height: 1.9;
  color: var(--cyan);
  text-transform: uppercase;
  letter-spacing: 1px;
  border-top: 1px solid var(--muted);
}

/* RIGHT panel */
#detail-right { display: flex; flex-direction: column; gap: 14px; }

#detail-top-right {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 16px;
}
#detail-description {
  font-size: 20px;
  line-height: 1.4;
  text-transform: uppercase;
  letter-spacing: 1px;
  flex: 1;
}
#detail-avatar-wrap {
  width: 90px;
  height: 90px;
  border-radius: 50%;
  border: 3px solid var(--cyan);
  overflow: hidden;
  flex-shrink: 0;
  background: #111;
}
#detail-avatar {
  width: 100%;
  height: 100%;
  object-fit: cover;
  filter: saturate(0.2) hue-rotate(200deg) brightness(0.85);
}

/* EVIDENCE GRID */
#evidence-grid {
  display: grid;
  gap: 6px;
}
.evidence-cell {
  border: 1px solid var(--muted);
  background: #0a1214;
  overflow: hidden;
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
}
.evidence-cell img {
  width: 100%; height: 100%;
  object-fit: cover;
  filter: saturate(0.2) hue-rotate(160deg);
  display: block;
}
.evidence-cell video {
  width: 100%; height: 100%;
  object-fit: cover;
}
.evidence-cell audio {
  width: 90%;
  position: absolute;
  bottom: 8px;
}
.evidence-type-label {
  position: absolute;
  top: 4px; left: 4px;
  font-size: 13px;
  background: rgba(0,0,0,0.72);
  color: var(--muted);
  padding: 1px 5px;
  text-transform: uppercase;
  letter-spacing: 1px;
  z-index: 2;
}
.evidence-empty {
  color: var(--muted);
  font-size: 13px;
  text-transform: uppercase;
  letter-spacing: 1px;
}

/* STATUS */
.status-active  { color: #00ff88; }
.status-claimed { color: #ffaa00; }
.status-expired { color: var(--muted); }

/* SCROLLBAR */
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: var(--dark); }
::-webkit-scrollbar-thumb { background: var(--muted); }

/* ══════════════════════════════════════
   DESKTOP LAYOUT  (≥ 768px)
══════════════════════════════════════ */
body.layout-desktop #topbar { padding: 10px 24px; }
body.layout-desktop #logo   { font-size: 30px; }
body.layout-desktop #search { width: 300px; font-size: 20px; }
body.layout-desktop #app    { padding: 20px 24px; }

body.layout-desktop #grid-view {
  grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
}

body.layout-desktop #detail-layout {
  display: grid;
  grid-template-columns: 300px 1fr;
  gap: 20px;
  align-items: start;
}

body.layout-desktop #evidence-grid {
  grid-template-columns: repeat(4, 1fr);
  grid-auto-rows: 140px;
}
/* first cell tall */
body.layout-desktop .evidence-cell:nth-child(1) { grid-row: span 2; }

/* ══════════════════════════════════════
   MOBILE LAYOUT  (< 768px)
══════════════════════════════════════ */
body.layout-mobile #topbar {
  padding: 8px 12px;
  gap: 8px;
}
body.layout-mobile #logo        { font-size: 20px; gap: 8px; }
body.layout-mobile #logo-icon   { width: 28px; height: 28px; font-size: 15px; }
body.layout-mobile #search      { width: 140px; font-size: 16px; padding: 4px 12px; }
body.layout-mobile #app         { padding: 10px; }

body.layout-mobile #grid-view {
  grid-template-columns: repeat(2, 1fr);
}

/* detail: single column stack */
body.layout-mobile #detail-layout {
  display: flex;
  flex-direction: column;
  gap: 14px;
}
body.layout-mobile #detail-left { width: 100%; }

body.layout-mobile #detail-top-right { flex-direction: column-reverse; align-items: flex-start; }
body.layout-mobile #detail-avatar-wrap { width: 70px; height: 70px; }
body.layout-mobile #detail-description { font-size: 17px; }

body.layout-mobile #evidence-grid {
  grid-template-columns: repeat(2, 1fr);
  grid-auto-rows: 120px;
}
body.layout-mobile .evidence-cell:nth-child(1) { grid-row: span 1; }

body.layout-mobile #back-btn { font-size: 17px; }
body.layout-mobile #detail-meta { font-size: 14px; line-height: 1.7; }
body.layout-mobile #detail-bounty-bar { font-size: 18px; }
body.layout-mobile #detail-name-role  { font-size: 15px; }
</style>
</head>
<body>

<!-- TOPBAR -->
<div id="topbar">
  <div id="logo">
    <div id="logo-icon">✕</div>
    THAWDABASE
  </div>
  <input id="search" type="text" placeholder="SEARCH HERE..." autocomplete="off">
</div>

<!-- APP -->
<div id="app">
  <div id="loading">LOADING...</div>

  <!-- GRID VIEW -->
  <div id="grid-view"></div>

  <!-- DETAIL VIEW -->
  <div id="detail-view">
    <button id="back-btn">← BACK</button>
    <div id="detail-layout">

      <!-- LEFT: profile card -->
      <div id="detail-left">
        <div id="detail-card-header">
          <span id="detail-name-role">—</span>
          <span id="detail-rating">0.0</span>
        </div>
        <div id="detail-photo-wrap">
          <div id="detail-photo-placeholder"></div>
        </div>
        <div id="detail-bounty-bar">BOUNTY: $0</div>
        <div id="detail-meta">
          <div>BOUNTY SET BY: <span id="detail-set-by">—</span></div>
          <div>PAYOUT METHOD: <span id="detail-payout">—</span></div>
          <div>LOCATION: <span id="detail-location">—</span></div>
          <div>STATUS: <span id="detail-status">—</span></div>
          <div>POSTED: <span id="detail-posted">—</span></div>
        </div>
      </div>

      <!-- RIGHT: description + evidence -->
      <div id="detail-right">
        <div id="detail-top-right">
          <div id="detail-description">—</div>
          <div id="detail-avatar-wrap">
            <img id="detail-avatar" src="" alt="" onerror="this.style.display='none'">
          </div>
        </div>
        <div id="evidence-grid"></div>
      </div>

    </div>
  </div>
</div>

<script>
// ══════════════════════════════════════
//  CONFIG
// ══════════════════════════════════════
const API_URL   = "https://script.google.com/macros/s/AKfycbzrRCMDftEQQsW9xluiCjfCH8rYFL15jVz9uiKX4HQBQwJM_F6zufF2HbsniHtkdKW8/exec";
const DATA_BASE = "data"; // repo folder: data/(CAT_ID)/

// Preview image candidates — tried in order until one loads
const PREVIEW_EXTS = ["png","jpg","jpeg","webp","gif","avif"];
const PREVIEW_NAME = "preview"; // filename stem, e.g. preview.png

// ══════════════════════════════════════
//  LAYOUT DETECTION
// ══════════════════════════════════════
const MOBILE_BP = 768; // px breakpoint

function applyLayout() {
  const isMobile = window.innerWidth < MOBILE_BP
    || /Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
  document.body.classList.remove("layout-desktop", "layout-mobile");
  document.body.classList.add(isMobile ? "layout-mobile" : "layout-desktop");
}

applyLayout();
window.addEventListener("resize", applyLayout);

// ══════════════════════════════════════
//  STATE
// ══════════════════════════════════════
let allBounties = [];
let filtered    = [];

// ══════════════════════════════════════
//  BOOT
// ══════════════════════════════════════
document.addEventListener("DOMContentLoaded", () => {
  fetchBounties();
  document.getElementById("search").addEventListener("input", onSearch);
  document.getElementById("back-btn").addEventListener("click", showGrid);
});

async function fetchBounties() {
  try {
    const res  = await fetch(`${API_URL}?action=all`);
    const data = await res.json();
    allBounties = Array.isArray(data) ? data : [];
    filtered    = allBounties;
    renderGrid(filtered);
  } catch (err) {
    const el = document.getElementById("loading");
    el.style.display  = "block";
    el.textContent    = "FAILED TO LOAD DATABASE";
    console.error(err);
  }
}

// ══════════════════════════════════════
//  PREVIEW IMAGE RESOLUTION
//  Tries data/(id)/preview.png, .jpg … in order.
//  Falls back to PHOTO_URL from sheet if all fail.
// ══════════════════════════════════════
function resolvePreview(b) {
  // If sheet has a full PHOTO_URL, we'll use that as a fallback chain end.
  // Build the probe list: local preview candidates first.
  const candidates = PREVIEW_EXTS.map(ext => `${DATA_BASE}/${b.CAT_ID}/${PREVIEW_NAME}.${ext}`);
  if (b.PHOTO_URL) candidates.push(b.PHOTO_URL);
  return candidates; // caller probes in order
}

/**
 * Return a <img> element that auto-probes the candidate list.
 * Adds appropriate CSS classes / IDs.
 */
function makePreviewImg(candidates, cssClass, id, alt) {
  const img = document.createElement("img");
  if (cssClass) img.className = cssClass;
  if (id)       img.id        = id;
  img.alt     = alt || "";
  img.loading = "lazy";

  let idx = 0;
  function tryNext() {
    if (idx >= candidates.length) {
      // All candidates exhausted — swap for placeholder
      const ph = document.createElement("div");
      if (cssClass) ph.className = cssClass.replace(/\S+photo\S*/g, "") + " card-photo-placeholder";
      if (id)       ph.id        = id + "-placeholder";
      img.replaceWith(ph);
      return;
    }
    img.src = candidates[idx++];
  }
  img.addEventListener("error", tryNext);
  tryNext();
  return img;
}

// ══════════════════════════════════════
//  SEARCH
// ══════════════════════════════════════
function onSearch(e) {
  const q = e.target.value.toLowerCase().trim();
  filtered = q
    ? allBounties.filter(b =>
        [b.NAME, b.ROLE, b.DESCRIPTION, b.BOUNTY_SET_BY, b.LOCATION_LABEL]
          .some(v => String(v || "").toLowerCase().includes(q)))
    : allBounties;
  renderGrid(filtered);
}

// ══════════════════════════════════════
//  GRID
// ══════════════════════════════════════
function renderGrid(bounties) {
  const loading = document.getElementById("loading");
  const grid    = document.getElementById("grid-view");
  loading.style.display = "none";
  grid.innerHTML = "";

  if (!bounties.length) {
    loading.style.display = "block";
    loading.textContent   = "NO RESULTS";
    return;
  }

  bounties.forEach(b => {
    const card = document.createElement("div");
    card.className = "cat-card";

    // Header
    const header = document.createElement("div");
    header.className = "card-header";
    header.innerHTML = `<span class="card-name">${esc(b.NAME)} / ${esc(b.ROLE)}</span>
                        <span class="card-rating">${esc(b.DANGER_RATING)}</span>`;

    // Preview image (auto-probed)
    const img = makePreviewImg(resolvePreview(b), "card-photo", null, b.NAME);

    // Bounty bar
    const bounty = document.createElement("div");
    bounty.className = "card-bounty";
    bounty.textContent = `BOUNTY:$${Number(b.BOUNTY_AMOUNT).toLocaleString()} ${b.BOUNTY_CURRENCY || ""}`.trim();

    card.appendChild(header);
    card.appendChild(img);
    card.appendChild(bounty);
    card.addEventListener("click", () => showDetail(b));
    grid.appendChild(card);
  });
}

// ══════════════════════════════════════
//  DETAIL
// ══════════════════════════════════════
function showDetail(b) {
  document.getElementById("grid-view").style.display   = "none";
  document.getElementById("detail-view").style.display = "block";

  // Left card
  document.getElementById("detail-name-role").textContent  = `${b.NAME} / ${b.ROLE}`;
  document.getElementById("detail-rating").textContent     = b.DANGER_RATING;
  document.getElementById("detail-bounty-bar").textContent = `BOUNTY: $${Number(b.BOUNTY_AMOUNT).toLocaleString()}`;
  document.getElementById("detail-set-by").textContent     = b.BOUNTY_SET_BY  || "—";
  document.getElementById("detail-payout").textContent     = b.PAYOUT_METHOD  || "—";
  document.getElementById("detail-location").textContent   = b.LOCATION_LABEL || `${b.LATITUDE}, ${b.LONGITUDE}`;
  document.getElementById("detail-posted").textContent     = b.DATE_POSTED    || "—";

  const statusEl = document.getElementById("detail-status");
  statusEl.textContent = b.STATUS || "—";
  statusEl.className   = `status-${(b.STATUS || "").toLowerCase()}`;

  // Detail photo — auto-probe same preview candidates
  const photoWrap = document.getElementById("detail-photo-wrap");
  photoWrap.innerHTML = "";
  photoWrap.appendChild(makePreviewImg(resolvePreview(b), "card-photo", "detail-photo", b.NAME));

  // Avatar — still pulled from AVATAR_URL sheet field (separate headshot)
  const avatar = document.getElementById("detail-avatar");
  if (b.AVATAR_URL) {
    avatar.src          = b.AVATAR_URL;
    avatar.style.display = "block";
  } else {
    avatar.style.display = "none";
  }

  // Description
  document.getElementById("detail-description").textContent =
    `${b.NAME}/${b.ROLE} IS ${b.DANGER_RATING} STAR DANGER. ` +
    `LOCATION IS ${b.LOCATION_LABEL || "UNKNOWN"} AND BOUNTY IS ` +
    `$${Number(b.BOUNTY_AMOUNT).toLocaleString()} SET BY ${b.BOUNTY_SET_BY || "UNKNOWN"}`;

  renderEvidence(b);

  // Scroll detail into view on mobile
  document.getElementById("detail-view").scrollIntoView({ behavior: "smooth", block: "start" });
}

// ══════════════════════════════════════
//  EVIDENCE
// ══════════════════════════════════════
function renderEvidence(b) {
  const grid  = document.getElementById("evidence-grid");
  const rawFields = [
    b.EVIDENCE_1, b.EVIDENCE_2, b.EVIDENCE_3, b.EVIDENCE_4,
    b.EVIDENCE_5, b.EVIDENCE_6, b.EVIDENCE_7, b.EVIDENCE_8
  ];

  grid.innerHTML = "";

  rawFields.forEach((raw, i) => {
    const cell = document.createElement("div");
    cell.className = "evidence-cell";

    const src = raw ? resolveMediaPath(b.CAT_ID, raw) : null;

    if (!src) {
      cell.innerHTML = `<span class="evidence-empty">NO FILE</span>`;
    } else {
      const type = mediaType(src);
      const label = document.createElement("span");
      label.className = "evidence-type-label";

      if (type === "image") {
        label.textContent = "IMG";
        const img = document.createElement("img");
        img.src     = src;
        img.alt     = `evidence ${i + 1}`;
        img.loading = "lazy";
        cell.appendChild(label);
        cell.appendChild(img);
      } else if (type === "video") {
        label.textContent = "VID";
        const vid = document.createElement("video");
        vid.src      = src;
        vid.controls = true;
        vid.muted    = true;
        vid.loop     = true;
        vid.setAttribute("playsinline", "");
        cell.appendChild(label);
        cell.appendChild(vid);
      } else if (type === "audio") {
        label.textContent = "AUD";
        const aud = document.createElement("audio");
        aud.src      = src;
        aud.controls = true;
        cell.appendChild(label);
        cell.appendChild(aud);
      } else {
        label.textContent = "FILE";
        const link = document.createElement("a");
        link.href        = src;
        link.target      = "_blank";
        link.textContent = "OPEN";
        link.style.cssText = "color:var(--cyan);font-size:14px;text-transform:uppercase;";
        cell.appendChild(label);
        cell.appendChild(link);
      }
    }

    grid.appendChild(cell);
  });
}

// ══════════════════════════════════════
//  HELPERS
// ══════════════════════════════════════
function resolveMediaPath(catId, value) {
  if (!value) return null;
  if (value.startsWith("http://") || value.startsWith("https://")) return value;
  return `${DATA_BASE}/${catId}/${value}`;
}

function mediaType(src) {
  const ext = src.split("?")[0].split(".").pop().toLowerCase();
  if (["jpg","jpeg","png","gif","webp","avif","svg"].includes(ext)) return "image";
  if (["mp4","webm","mov","ogv"].includes(ext))                      return "video";
  if (["mp3","wav","flac","aac","m4a","ogg"].includes(ext))          return "audio";
  return "other";
}

function showGrid() {
  document.getElementById("detail-view").style.display = "none";
  document.getElementById("grid-view").style.display   = "grid";
  window.scrollTo({ top: 0, behavior: "smooth" });
}

function esc(str) {
  return String(str ?? "")
    .replace(/&/g,"&amp;").replace(/</g,"&lt;")
    .replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}
</script>
</body>
  </html>
